<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLog - Dashboard</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">FitLog</span>
        </div>
        <div class="nav-links">
            <a href="./index.html" class="active">Dashboard</a>
            <a href="./log.html">Log Workout</a>
            <a href="./history.html">History</a>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Your Progress</h1>
            <p class="subtitle">Per-user regression models, fit server-side on Chaprola</p>
        </header>

        <section id="weekly-summary" class="weekly-summary" style="display:none;"></section>

        <section class="overview-section">
            <div id="overview-loading" class="loading">Loading dashboard...</div>
            <div id="overview-grid" class="exercise-grid" style="display: none;"></div>
        </section>

        <section id="quick-actions" class="quick-actions">
            <a href="./log.html" class="btn btn-primary btn-large">Log New Workout</a>
            <a id="tip-jar-btn" class="btn btn-secondary btn-large" style="display:none;" target="_blank" rel="noopener">❤️ Support fitlog — $5</a>
        </section>
        <section id="guest-cta-slot"></section>
    </main>

    <script src="https://chaprola.org/chaprola-auth.js"></script>
    <script src="./api.js"></script>
    <script>
        const exercises = [
            { id: 'bench_press', name: 'Bench Press', icon: '🏋️' },
            { id: 'squat', name: 'Squat', icon: '🦵' },
            { id: 'deadlift', name: 'Deadlift', icon: '💪' },
            { id: 'overhead_press', name: 'Overhead Press', icon: '🙌' }
        ];

        async function loadWeeklySummary(mostRecentDate) {
            const el = document.getElementById('weekly-summary');
            try {
                const res = await FITLOG_API.weeklySummary();
                const count = (res.aggregates && res.aggregates.workout_id && res.aggregates.workout_id.count) || 0;
                // count==0 is the common case for guest (sample data is months
                // old) and for new users with prior-but-not-recent activity.
                // Fall back to "Last logged" so the card is informative rather
                // than a demotivating zero (Vogel 2026-04-21).
                if (count === 0) {
                    if (!mostRecentDate) return;
                    el.innerHTML = `<div class="weekly-card">
                        <span class="weekly-label">Last logged</span>
                        <span class="weekly-value">${esc(mostRecentDate)}</span>
                    </div>`;
                } else {
                    el.innerHTML = `<div class="weekly-card">
                        <span class="weekly-label">Last 7 days</span>
                        <span class="weekly-value">${count}</span>
                        <span class="weekly-unit">${count === 1 ? 'set logged' : 'sets logged'}</span>
                    </div>`;
                }
                el.style.display = '';
            } catch (err) {
                // Silent fail — weekly summary is nice-to-have, not blocking
                console.warn('weeklySummary failed:', err);
            }
        }

        async function loadDashboard() {
            try {
                const [modelsData, workoutsData] = await Promise.all([
                    FITLOG_API.getModels(),
                    FITLOG_API.getWorkouts(null, 100)
                ]);

                const workouts = workoutsData.records || [];
                const mostRecentDate = workouts[0] ? workouts[0].date.trim() : null;

                renderDashboard(modelsData.records || [], workouts);
                loadWeeklySummary(mostRecentDate);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('overview-loading').textContent = 'Error loading data. Please refresh the page.';
            }
        }

        function renderDashboard(models, workouts) {
            const grid = document.getElementById('overview-grid');
            const loading = document.getElementById('overview-loading');
            const unit = window.FITLOG_UNIT || 'lbs';

            const workoutsByExercise = {};
            workouts.forEach(w => {
                const ex = w.exercise.trim();
                if (!workoutsByExercise[ex]) workoutsByExercise[ex] = [];
                workoutsByExercise[ex].push(w);
            });

            const modelLookup = {};
            models.forEach(m => { modelLookup[m.exercise.trim()] = m; });

            grid.innerHTML = exercises.map(ex => {
                const model = modelLookup[ex.id];
                const recentWorkouts = workoutsByExercise[ex.id] || [];
                const latestWorkout = recentWorkouts[0];

                if (!model) return `
                    <div class="exercise-card exercise-card-empty">
                        <div class="card-header">
                            <span class="exercise-icon">${ex.icon}</span>
                            <h2>${esc(ex.name)}</h2>
                        </div>
                        <div class="card-stats">
                            <div class="stat-primary">
                                <span class="stat-value">—</span>
                                <span class="stat-label">No data yet — log a set to start tracking</span>
                            </div>
                        </div>
                        <div class="card-footer">
                            <span class="last-workout">No workouts yet</span>
                            <a href="./log.html?exercise=${esc(ex.id)}" class="view-details">Log →</a>
                        </div>
                    </div>
                `;

                // Current 1RM anchors to THIS exercise's latest session, not
                // the global max across all exercises — a stale bench fit
                // shouldn't pretend to have rolled forward just because the
                // user squatted today (Vogel 2026-04-21).
                const exerciseDays = recentWorkouts.map(w => parseInt(w.day_number, 10)).filter(n => !isNaN(n));
                const exerciseDay = exerciseDays.length ? Math.max(...exerciseDays) : 1;

                const slope = parseFloat(model.param_a) || 0;
                const base = parseFloat(model.param_b) || 0;
                const r2 = parseFloat(model.r_squared) || 0;
                const current1RM = FITLOG_API.toDisplay(slope * exerciseDay + base, unit);
                const projected30 = FITLOG_API.toDisplay(slope * (exerciseDay + 30) + base, unit);
                const weeklyGain = FITLOG_API.toDisplay(slope * 7, unit);

                return `
                    <a href="./exercise.html?name=${esc(ex.id)}" class="exercise-card">
                        <div class="card-header">
                            <span class="exercise-icon">${ex.icon}</span>
                            <h2>${esc(ex.name)}</h2>
                            ${r2 > 0 ? `<span class="r2-badge" title="Goodness of fit">R² ${r2.toFixed(2)}</span>` : ''}
                        </div>
                        <div class="card-stats">
                            <div class="stat-primary">
                                <span class="stat-value">${current1RM}</span>
                                <span class="stat-unit">${esc(unit)}</span>
                                <span class="stat-label">Est. 1RM</span>
                            </div>
                            <div class="stat-secondary">
                                <div class="stat-item">
                                    <span class="stat-value-sm">+${weeklyGain}</span>
                                    <span class="stat-label-sm">${esc(unit)}/week</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-value-sm">${projected30}</span>
                                    <span class="stat-label-sm">30-day proj.</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <span class="last-workout">
                                ${latestWorkout ? `Last: ${FITLOG_API.toDisplay(latestWorkout.weight, unit)}${esc(unit)} × ${esc(String(latestWorkout.reps).trim())}` : 'No workouts yet'}
                            </span>
                            <span class="view-details">View Details →</span>
                        </div>
                    </a>
                `;
            }).join('');

            loading.style.display = 'none';
            grid.style.display = 'grid';
        }

        (async () => {
            await requireAuth();
            if (FITLOG_API.isGuest()) {
                // Replace the whole write-action bar with the sign-up CTA.
                document.getElementById('quick-actions').style.display = 'none';
                document.getElementById('guest-cta-slot').innerHTML = guestSignupCta();
            } else if (TIP_URL) {
                const btn = document.getElementById('tip-jar-btn');
                btn.href = TIP_URL;
                btn.style.display = '';
            }
            loadDashboard();
        })();
    </script>
</body>
</html>
