<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Detail - FitLog</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">FitLog</span>
        </div>
        <div class="nav-links">
            <a href="./index.html">Dashboard</a>
            <a href="./log.html">Log Workout</a>
        </div>
    </nav>

    <main class="container">
        <a href="./index.html" class="back-link">← Back to Dashboard</a>

        <header class="page-header">
            <div class="exercise-detail-header">
                <span id="exercise-icon" class="exercise-icon"></span>
                <h1 id="exercise-name">Loading...</h1>
            </div>
            <p class="subtitle">Fitted linear model: 1RM = slope × day + base</p>
        </header>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <span id="current-1rm" class="stat-value">--</span>
                <span class="stat-unit">lbs</span>
                <span class="stat-label">Current Est. 1RM</span>
            </div>
            <div class="stat-card">
                <span id="daily-gain" class="stat-value">--</span>
                <span class="stat-unit">lbs/day</span>
                <span class="stat-label">Growth Rate</span>
            </div>
            <div class="stat-card">
                <span id="base-1rm" class="stat-value">--</span>
                <span class="stat-unit">lbs</span>
                <span class="stat-label">Base 1RM</span>
            </div>
            <div class="stat-card">
                <span id="total-sets" class="stat-value">--</span>
                <span class="stat-label">Total Sets Logged</span>
            </div>
        </div>

        <!-- Progress Chart -->
        <div class="chart-container">
            <div class="chart-header">
                <h2 class="chart-title">Progress Over Time</h2>
                <div class="chart-legend">
                    <div class="legend-item">
                        <span class="legend-dot actual"></span>
                        <span>Actual 1RM</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot predicted"></span>
                        <span>Fitted Model</span>
                    </div>
                </div>
            </div>
            <canvas id="progressChart"></canvas>
        </div>

        <!-- Projections -->
        <div class="form-section">
            <h3 style="margin-bottom: 1rem;">Projections</h3>
            <div class="projections-row" id="projections"></div>
        </div>

        <!-- History Link -->
        <div class="quick-actions">
            <a id="history-link" href="#" class="btn btn-secondary">View Full History →</a>
            <a href="./log.html" class="btn btn-primary" style="margin-left: 1rem;">Log Workout</a>
        </div>
    </main>

    <script src="./api.js"></script>
    <script>
        const exerciseId = getUrlParam('name') || 'bench_press';
        const exerciseInfo = EXERCISES[exerciseId] || { name: exerciseId, icon: '🏋️' };

        async function loadExerciseDetail() {
            document.getElementById('exercise-name').textContent = exerciseInfo.name;
            document.getElementById('exercise-icon').textContent = exerciseInfo.icon;
            document.getElementById('history-link').href = `./history.html?exercise=${exerciseId}`;
            document.title = `${exerciseInfo.name} - FitLog`;

            try {
                // Load model and workouts in parallel
                const [model, workoutsData] = await Promise.all([
                    FITLOG_API.getModel(exerciseId),
                    FITLOG_API.getWorkouts(exerciseId, 500)
                ]);

                const workouts = workoutsData.records || [];
                const slope = parseFloat(model?.param_a) || 0;
                const base = parseFloat(model?.param_b) || 0;
                const currentDay = 38;

                // Update stats
                document.getElementById('current-1rm').textContent = Math.round(FITLOG_API.predict1RM(slope, base, currentDay));
                document.getElementById('daily-gain').textContent = slope.toFixed(3);
                document.getElementById('base-1rm').textContent = Math.round(base);
                document.getElementById('total-sets').textContent = workouts.length;

                // Projections
                const projections = [
                    { days: 30, label: '30-Day' },
                    { days: 60, label: '60-Day' },
                    { days: 90, label: '90-Day' },
                    { days: 180, label: '6-Month' }
                ];
                document.getElementById('projections').innerHTML = projections.map(p => {
                    const predicted = Math.round(FITLOG_API.predict1RM(slope, base, currentDay + p.days));
                    return `<div class="projection-badge">${p.label}: <strong>${predicted} lbs</strong></div>`;
                }).join('');

                // Draw chart
                drawChart(workouts, slope, base);

            } catch (error) {
                console.error('Error loading exercise detail:', error);
            }
        }

        function drawChart(workouts, slope, base) {
            const canvas = document.getElementById('progressChart');
            const ctx = canvas.getContext('2d');

            // Set canvas size
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 48;
            canvas.height = 300;

            // Aggregate workouts by day
            const dayData = {};
            workouts.forEach(w => {
                const day = parseInt(w.day_number);
                const est1rm = parseInt(w.estimated_1rm);
                if (!dayData[day]) dayData[day] = [];
                dayData[day].push(est1rm);
            });

            // Calculate daily max
            const dataPoints = Object.entries(dayData)
                .map(([day, values]) => ({
                    day: parseInt(day),
                    max: Math.max(...values),
                    avg: values.reduce((a, b) => a + b, 0) / values.length
                }))
                .sort((a, b) => a.day - b.day);

            if (dataPoints.length === 0) {
                ctx.fillStyle = '#606070';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('No workout data available', canvas.width / 2, canvas.height / 2);
                return;
            }

            // Chart dimensions
            const padding = { top: 20, right: 20, bottom: 40, left: 60 };
            const chartWidth = canvas.width - padding.left - padding.right;
            const chartHeight = canvas.height - padding.top - padding.bottom;

            // Scale
            const minDay = Math.min(...dataPoints.map(d => d.day));
            const maxDay = Math.max(...dataPoints.map(d => d.day), 60);
            const minVal = Math.min(...dataPoints.map(d => d.max)) * 0.95;
            const maxVal = Math.max(...dataPoints.map(d => d.max), FITLOG_API.predict1RM(slope, base, maxDay)) * 1.05;

            const scaleX = day => padding.left + ((day - minDay) / (maxDay - minDay)) * chartWidth;
            const scaleY = val => padding.top + chartHeight - ((val - minVal) / (maxVal - minVal)) * chartHeight;

            // Clear canvas
            ctx.fillStyle = '#1a1a24';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid lines
            ctx.strokeStyle = '#2a2a3a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (chartHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(canvas.width - padding.right, y);
                ctx.stroke();

                // Y-axis labels
                const value = maxVal - ((maxVal - minVal) / 5) * i;
                ctx.fillStyle = '#606070';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(Math.round(value) + ' lbs', padding.left - 8, y + 4);
            }

            // X-axis labels
            ctx.textAlign = 'center';
            for (let day = minDay; day <= maxDay; day += Math.ceil((maxDay - minDay) / 6)) {
                ctx.fillText('Day ' + day, scaleX(day), canvas.height - 10);
            }

            // Draw predicted line (fitted model)
            ctx.strokeStyle = '#7c3aed';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            for (let day = minDay; day <= maxDay; day++) {
                const pred = FITLOG_API.predict1RM(slope, base, day);
                const x = scaleX(day);
                const y = scaleY(pred);
                if (day === minDay) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw actual data points
            ctx.fillStyle = '#00d4ff';
            dataPoints.forEach(point => {
                const x = scaleX(point.day);
                const y = scaleY(point.max);
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Connect actual points with line
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            dataPoints.forEach((point, i) => {
                const x = scaleX(point.day);
                const y = scaleY(point.max);
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            ctx.stroke();
        }

        // Redraw on resize
        window.addEventListener('resize', loadExerciseDetail);

        loadExerciseDetail();
    </script>
</body>
</html>
