<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Workout - FitLog</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">FitLog</span>
        </div>
        <div class="nav-links">
            <a href="./index.html">Dashboard</a>
            <a href="./log.html" class="active">Log Workout</a>
            <a href="./history.html">History</a>
        </div>
    </nav>

    <main class="container">
        <a href="./index.html" class="back-link">← Back to Dashboard</a>

        <header class="page-header">
            <h1>Log Workout</h1>
            <p class="subtitle">Record your set and track progress</p>
        </header>

        <div id="alert-container"></div>

        <section id="guest-cta-slot"></section>

        <form id="workout-form" class="form-section">
            <div class="form-group">
                <label class="form-label" for="exercise">Exercise</label>
                <select id="exercise" class="form-control" required>
                    <option value="">Select exercise...</option>
                    <option value="bench_press">Bench Press</option>
                    <option value="squat">Squat</option>
                    <option value="deadlift">Deadlift</option>
                    <option value="overhead_press">Overhead Press</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="weight">Weight</label>
                <div class="input-group">
                    <input type="number" id="weight" class="form-control" placeholder="185" min="0" step="5" required>
                    <span class="input-suffix" id="weight-unit">lbs</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="reps">Reps</label>
                <input type="number" id="reps" class="form-control" placeholder="5" min="1" max="50" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="date">Date</label>
                <input type="date" id="date" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="notes">Notes (optional)</label>
                <input type="text" id="notes" class="form-control" placeholder="Felt strong today...">
            </div>

            <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">Log Set</button>
        </form>

        <div id="estimate-preview" class="form-section" style="display: none;">
            <h3 style="margin-bottom: 0.5rem;">Estimated 1RM</h3>
            <p class="subtitle" style="margin-bottom: 1rem;">Based on Epley formula</p>
            <div style="text-align: center;">
                <span id="estimated-1rm" class="stat-value">--</span>
                <span class="stat-unit" id="estimate-unit">lbs</span>
            </div>
        </div>

        <div class="form-section">
            <h3 style="margin-bottom: 1rem;">Recent Sets</h3>
            <div id="recent-loading" class="loading">Loading...</div>
            <table id="recent-table" class="history-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Exercise</th>
                        <th>Weight</th>
                        <th>Reps</th>
                        <th>Est. 1RM</th>
                    </tr>
                </thead>
                <tbody id="recent-tbody"></tbody>
            </table>
        </div>
    </main>

    <script src="https://chaprola.org/chaprola-auth.js"></script>
    <script src="./api.js"></script>
    <script>
        (async () => {
            await requireAuth();
            const unit = window.FITLOG_UNIT || 'lbs';
            document.getElementById('weight-unit').textContent = unit;
            document.getElementById('estimate-unit').textContent = unit;

            // Guest is read-only: replace the log form + estimate preview
            // with the sign-up CTA. Recent Sets below still loads for reads.
            if (FITLOG_API.isGuest()) {
                document.getElementById('workout-form').style.display = 'none';
                document.getElementById('estimate-preview').style.display = 'none';
                document.getElementById('guest-cta-slot').innerHTML = guestSignupCta({
                    headline: "Sign up to log workouts",
                    body: "Guests can browse the sample data and see HULDRA's fitted curves. Create a free account to track your own sets."
                });
                // Still load Recent Sets so guest sees the sample activity.
                await loadRecentSets();
                return;
            }

            // Default date = today, in user's local timezone
            document.getElementById('date').valueAsDate = new Date();

            const weightInput = document.getElementById('weight');
            const repsInput = document.getElementById('reps');
            const estimatePreview = document.getElementById('estimate-preview');
            const estimatedValue = document.getElementById('estimated-1rm');

            function updateEstimate() {
                const w = parseFloat(weightInput.value);
                const r = parseInt(repsInput.value);
                if (w > 0 && r > 0) {
                    // Epley on the entered values — display unit matches input unit
                    estimatedValue.textContent = epley1RM(w, r);
                    estimatePreview.style.display = 'block';
                } else {
                    estimatePreview.style.display = 'none';
                }
            }
            weightInput.addEventListener('input', updateEstimate);
            repsInput.addEventListener('input', updateEstimate);

            async function loadRecentSets() {
                try {
                    // Filter Recent Sets to the selected exercise when one is chosen;
                    // show the mixed list when the picker is blank (initial state).
                    const selectedExercise = document.getElementById('exercise').value || null;
                    const data = await FITLOG_API.getWorkouts(selectedExercise, 10);
                    const tbody = document.getElementById('recent-tbody');
                    tbody.innerHTML = (data.records || []).map(w => {
                        const name = EXERCISES[w.exercise.trim()]?.name || w.exercise;
                        return `
                            <tr>
                                <td>${esc(name)}</td>
                                <td>${FITLOG_API.toDisplay(w.weight, unit)} ${esc(unit)}</td>
                                <td>${esc(String(w.reps).trim())}</td>
                                <td>${FITLOG_API.toDisplay(w.estimated_1rm, unit)} ${esc(unit)}</td>
                            </tr>
                        `;
                    }).join('');
                    document.getElementById('recent-loading').style.display = 'none';
                    document.getElementById('recent-table').style.display = 'table';
                } catch (error) {
                    console.error('Error loading recent sets:', error);
                    document.getElementById('recent-loading').textContent = 'Error loading data';
                }
            }

            // Re-filter Recent Sets when the exercise picker changes.
            document.getElementById('exercise').addEventListener('change', loadRecentSets);

            document.getElementById('workout-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const alertContainer = document.getElementById('alert-container');
                const exercise = document.getElementById('exercise').value;
                const weightInput = document.getElementById('weight').value;
                const reps = document.getElementById('reps').value;
                const date = document.getElementById('date').value;
                const notes = document.getElementById('notes').value;

                // Canonical storage is lbs; convert display-entered values back.
                const weightLbs = FITLOG_API.toLbs(weightInput, unit);

                // Day number from Jan 1, 2026 (canonical epoch for fitted-model day axis)
                const startDate = new Date('2026-01-01');
                const workoutDate = new Date(date);
                const dayNumber = Math.floor((workoutDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
                const est1rm = epley1RM(weightLbs, parseInt(reps));

                // Collision-free ID via crypto.randomUUID, truncated to the 12-char field width
                const workoutId = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())).replace(/-/g, '').slice(0, 12);

                const record = {
                    workout_id: workoutId,
                    exercise,
                    weight: String(weightLbs),
                    reps: String(reps),
                    date,
                    day_number: String(dayNumber),
                    estimated_1rm: String(est1rm),
                    notes: notes || ''
                };

                try {
                    const result = await FITLOG_API.insertRecord('workouts', record);
                    if (result.status === 'ok') {
                        const name = EXERCISES[exercise]?.name || exercise;
                        alertContainer.innerHTML = `
                            <div class="alert alert-success">
                                <strong>Set logged!</strong><br>
                                ${esc(name)}: ${FITLOG_API.toDisplay(weightLbs, unit)} ${esc(unit)} × ${esc(String(reps))} reps (Est. 1RM: ${FITLOG_API.toDisplay(est1rm, unit)} ${esc(unit)})
                                <br><small>Day ${esc(String(dayNumber))} — ${esc(date)}</small>
                            </div>
                        `;
                        document.getElementById('exercise').value = '';
                        document.getElementById('weight').value = '';
                        document.getElementById('reps').value = '';
                        document.getElementById('notes').value = '';
                        estimatePreview.style.display = 'none';

                        // Refit the per-user model analytically (OLS). Upserts models.DA.
                        FITLOG_API.refitModel(exercise).catch(err => console.warn('refit failed:', err));

                        loadRecentSets();
                    } else {
                        throw new Error(result.message || 'Failed to log workout');
                    }
                } catch (error) {
                    alertContainer.innerHTML = `
                        <div class="alert alert-error">
                            <strong>Error logging workout:</strong><br>${esc(error.message || String(error))}
                        </div>
                    `;
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            loadRecentSets();
        })();
    </script>
</body>
</html>
